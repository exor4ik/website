<!-- Лайтбокс -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
  <img src="" alt="Fullscreen" id="lightbox-img">
  <button class="lightbox-next" id="lightbox-next">&#10095;</button>

<div id="footer-container"></div>
<script src="script.js"></script>
<script>
// Лайтбокс с плавным масштабированием: миниатюра -> центр -> миниатюра
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxClose = document.getElementById('lightbox-close');
const lightboxPrev = document.getElementById('lightbox-prev');
const lightboxNext = document.getElementById('lightbox-next');
const galleryItems = document.querySelectorAll('.gallery-item img');

const ANIMATION_DURATION = 420;
const CENTER_MAX_WIDTH_RATIO = 0.9;
const CENTER_MAX_HEIGHT_RATIO = 0.9;
const SWAP_FADE_OUT_MS = 170;
const SWAP_FADE_IN_MS = 210;
const SWAP_ZOOM_OUT = 0.94;
const SWAP_ZOOM_IN_START = 1.06;

let currentIndex = 0;
let isAnimating = false;
let centeredRect = null;

function setBodyScrollLocked(locked) {
  document.body.style.overflow = locked ? 'hidden' : '';
  document.body.style.overflowY = locked ? 'hidden' : '';
}

function normalizeRect(rect) {
  return {
    left: Number.isFinite(rect.left) ? rect.left : (window.innerWidth - 1) / 2,
    top: Number.isFinite(rect.top) ? rect.top : (window.innerHeight - 1) / 2,
    width: Math.max(1, Number.isFinite(rect.width) ? rect.width : 1),
    height: Math.max(1, Number.isFinite(rect.height) ? rect.height : 1)
  };
}

function getCenteredRect(img) {
  const maxWidth = window.innerWidth * CENTER_MAX_WIDTH_RATIO;
  const maxHeight = window.innerHeight * CENTER_MAX_HEIGHT_RATIO;
  const ratio = (img.naturalWidth > 0 && img.naturalHeight > 0) ? img.naturalWidth / img.naturalHeight : 16 / 9;

  let width = maxWidth;
  let height = width / ratio;

  if (height > maxHeight) {
    height = maxHeight;
    width = height * ratio;
  }

  return {
    left: (window.innerWidth - width) / 2,
    top: (window.innerHeight - height) / 2,
    width,
    height
  };
}

function setImageRect(rect) {
  const safe = normalizeRect(rect);
  lightboxImg.style.left = `${safe.left}px`;
  lightboxImg.style.top = `${safe.top}px`;
  lightboxImg.style.width = `${safe.width}px`;
  lightboxImg.style.height = `${safe.height}px`;
  lightboxImg.style.transform = 'translate3d(0, 0, 0) scale(1, 1)';
}

function animateImageBetweenRects(fromRect, toRect, onDone) {
  const start = normalizeRect(fromRect);
  const end = normalizeRect(toRect);
  const dx = end.left - start.left;
  const dy = end.top - start.top;
  const scaleX = end.width / start.width;
  const scaleY = end.height / start.height;

  lightboxImg.style.transition = 'none';
  lightboxImg.style.opacity = '1';
  setImageRect(start);
  lightboxImg.getBoundingClientRect();

  let finished = false;
  const finish = () => {
    if (finished) return;
    finished = true;
    clearTimeout(fallbackTimer);
    lightboxImg.removeEventListener('transitionend', onTransitionEnd);
    lightboxImg.style.transition = 'none';
    setImageRect(end);
    onDone();
  };

  const onTransitionEnd = (event) => {
    if (event.propertyName === 'transform') {
      finish();
    }
  };

  lightboxImg.addEventListener('transitionend', onTransitionEnd);
  const fallbackTimer = setTimeout(finish, ANIMATION_DURATION + 100);

  requestAnimationFrame(() => {
    lightboxImg.style.transition = `transform ${ANIMATION_DURATION}ms cubic-bezier(.22,1,.36,1)`;
    lightboxImg.style.transform = `translate3d(${dx}px, ${dy}px, 0) scale(${scaleX}, ${scaleY})`;
  });
}

function openLightbox(index) {
  if (isAnimating || !galleryItems[index]) return;

  currentIndex = index;
  isAnimating = true;

  const source = galleryItems[currentIndex];
  const startRect = source.getBoundingClientRect();
  centeredRect = getCenteredRect(source);

  lightboxImg.src = source.currentSrc || source.src;
  lightboxImg.alt = source.alt || 'Фото';

  setBodyScrollLocked(true);
  lightbox.classList.add('active');

  requestAnimationFrame(() => {
    animateImageBetweenRects(startRect, centeredRect, () => {
      isAnimating = false;
    });
  });
}

function closeLightbox() {
  if (isAnimating || !lightbox.classList.contains('active')) return;

  isAnimating = true;
  const source = galleryItems[currentIndex];
  const endRect = source ? source.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 1, height: 1 };
  const startRect = centeredRect || getCenteredRect(source || lightboxImg);

  animateImageBetweenRects(startRect, endRect, () => {
    lightbox.classList.remove('active');
    setBodyScrollLocked(false);
    centeredRect = null;
    lightboxImg.style.transition = 'none';
    lightboxImg.style.opacity = '1';
    lightboxImg.style.left = '0';
    lightboxImg.style.top = '0';
    lightboxImg.style.width = '0';
    lightboxImg.style.height = '0';
    lightboxImg.style.transform = 'translate3d(0, 0, 0) scale(1, 1)';
    isAnimating = false;
  });
}

function swapImage(nextIndex) {
  if (isAnimating || !lightbox.classList.contains('active')) return;

  isAnimating = true;
  currentIndex = (nextIndex + galleryItems.length) % galleryItems.length;

  const next = galleryItems[currentIndex];
  centeredRect = getCenteredRect(next);

  lightboxImg.style.transition = `opacity ${SWAP_FADE_OUT_MS}ms ease, transform ${SWAP_FADE_OUT_MS}ms ease`;
  lightboxImg.style.opacity = '0';
  lightboxImg.style.transform = `translate3d(0, 0, 0) scale(${SWAP_ZOOM_OUT})`;

  setTimeout(() => {
    lightboxImg.src = next.currentSrc || next.src;
    lightboxImg.alt = next.alt || 'Фото';
    setImageRect(centeredRect);
    lightboxImg.style.opacity = '0';
    lightboxImg.style.transform = `translate3d(0, 0, 0) scale(${SWAP_ZOOM_IN_START})`;

    requestAnimationFrame(() => {
      lightboxImg.style.transition = `opacity ${SWAP_FADE_IN_MS}ms ease, transform ${SWAP_FADE_IN_MS}ms cubic-bezier(.22,1,.36,1)`;
      lightboxImg.style.opacity = '1';
      lightboxImg.style.transform = 'translate3d(0, 0, 0) scale(1)';
      setTimeout(() => {
        lightboxImg.style.transition = 'none';
        isAnimating = false;
      }, SWAP_FADE_IN_MS + 20);
    });
  }, SWAP_FADE_OUT_MS);
}

function showPrev() {
  swapImage(currentIndex - 1);
}

function showNext() {
  swapImage(currentIndex + 1);
}

galleryItems.forEach((img, index) => {
  img.addEventListener('click', () => openLightbox(index));
});

lightboxClose.addEventListener('click', closeLightbox);
lightboxPrev.addEventListener('click', showPrev);
lightboxNext.addEventListener('click', showNext);
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

lightbox.addEventListener('wheel', (e) => {
  if (!lightbox.classList.contains('active')) return;
  e.preventDefault();
  e.stopPropagation();
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') showPrev();
  if (e.key === 'ArrowRight') showNext();
});

window.addEventListener('resize', () => {
  if (!lightbox.classList.contains('active') || isAnimating) return;
  const source = galleryItems[currentIndex];
  centeredRect = getCenteredRect(source || lightboxImg);
  setImageRect(centeredRect);
});
</script>
</body>
