<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сообщения — EgorNetwork</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
/* ══ MESSAGES PAGE ══════════════════════════════════════════ */
.messages-wrap {
  max-width: 1000px; margin: 0 auto;
  padding: 110px 24px 40px;
  height: 100vh; display: flex; flex-direction: column;
  box-sizing: border-box;
}

#messages-root {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

.messages-layout {
  flex: 1; display: flex; gap: 16px; min-height: 0;
}

/* ── SIDEBAR ── */
.conv-sidebar {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto; overflow-x: hidden; min-height: 0;
}
.conv-sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0 8px; flex-shrink: 0;
}
.conv-sidebar-header h3 { margin: 0; font-size: 1rem; color: #fff; }

.conv-new-btn {
  padding: 6px 14px; border-radius: 8px; font-size: .82rem;
  border: 1px solid var(--line-bright); background: var(--grad-btn);
  color: var(--text); cursor: pointer; transition: all .25s; font-family: inherit;
}
.conv-new-btn:hover { background: var(--grad-btn-hover); transform: translateY(-1px); }

.conv-list { display: flex; flex-direction: column; gap: 4px; flex: 1; }

.conv-item {
  padding: 12px 14px; border-radius: 12px; cursor: pointer;
  border: 1px solid transparent;
  background: rgba(255,255,255,.03);
  transition: all .2s; display: flex; gap: 10px; align-items: center;
  position: relative;
}
.conv-item:hover  { background: rgba(255,255,255,.07); border-color: var(--line); }
.conv-item.active { background: rgba(109,213,255,.08); border-color: rgba(109,213,255,.25); }

.conv-avatar {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: var(--grad-primary); display: grid; place-items: center;
  font-weight: 700; color: #041025; font-size: 1rem; overflow: hidden;
}
.conv-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }

.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: .9rem; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-preview { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

.conv-unread {
  min-width: 18px; height: 18px; border-radius: 9px;
  background: var(--accent); color: #041025;
  font-size: .7rem; font-weight: 700;
  display: grid; place-items: center; padding: 0 4px;
  flex-shrink: 0;
}

.conv-empty {
  color: var(--muted); font-size: .85rem; font-style: italic;
  padding: 16px 4px; text-align: center;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; min-height: 0;
  background: var(--grad-glass);
  border: 1px solid rgba(160,195,255,.16);
  border-radius: 18px; overflow: hidden;
}

.chat-placeholder {
  flex: 1; display: grid; place-items: center;
  color: var(--muted); font-size: .95rem; text-align: center;
  padding: 40px;
}
.chat-placeholder-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }

/* Шапка чата */
.chat-header {
  padding: 14px 18px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
  background: rgba(14,22,38,.5); flex-shrink: 0;
}
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--grad-primary); display: grid; place-items: center;
  font-weight: 700; color: #041025; overflow: hidden; flex-shrink: 0;
}
.chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.chat-header-name { font-weight: 600; color: #fff; font-size: .95rem; }
.chat-header-status { font-size: .75rem; color: var(--muted); }
.chat-header-link {
  margin-left: auto; color: var(--muted); font-size: .8rem;
  text-decoration: none; transition: color .2s; flex-shrink: 0;
}
.chat-header-link:hover { color: var(--accent); }

/* Сообщения */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
  min-height: 0;
}

.msg-group { display: flex; flex-direction: column; gap: 2px; }

.msg {
  display: flex; gap: 8px; align-items: flex-end;
  animation: msg-appear .2s ease;
}
@keyframes msg-appear {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.own { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
  background: var(--grad-primary); display: grid; place-items: center;
  font-size: .75rem; font-weight: 700; color: #041025; overflow: hidden;
  align-self: flex-end;
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

/* === ИСПРАВЛЕННЫЕ СТИЛИ ПУЗЫРЯ === */
.msg-content {
  display: flex;
  flex-direction: column;
  max-width: 68%;
  min-width: 0;
}

.msg-bubble {
  display: block;
  width: fit-content;
  max-width: 100%;
  padding: 9px 13px;
  border-radius: 14px;
  font-size: .9rem;
  line-height: 1.5;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg:not(.own) .msg-bubble {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.08);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.msg.own .msg-bubble {
  background: linear-gradient(135deg, rgba(109,213,255,.2), rgba(139,123,255,.18));
  border: 1px solid rgba(109,213,255,.2);
  border-bottom-right-radius: 4px;
  color: #fff;
}

.msg-time {
  font-size: .68rem;
  color: rgba(168,179,204,.5);
  margin-top: 3px;
  text-align: right;
}
.msg:not(.own) .msg-time { text-align: left; }

.msg-date-divider {
  text-align: center; color: var(--muted); font-size: .75rem;
  padding: 8px 0; display: flex; align-items: center; gap: 10px;
}
.msg-date-divider::before, .msg-date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}

/* Инпут */
.chat-input-area {
  padding: 12px 16px; border-top: 1px solid var(--line);
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  background: rgba(14,22,38,.4);
}
.chat-input {
  flex: 1; padding: 10px 14px; border-radius: 12px;
  border: 1px solid var(--line); background: rgba(0,0,0,.3);
  color: var(--text); font-size: .9rem; font-family: inherit;
  resize: none; max-height: 120px; line-height: 1.45;
  transition: border-color .3s;
  overflow-y: auto;
}
.chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(109,213,255,.1); }
.chat-send-btn {
  padding: 10px 18px; border-radius: 12px;
  border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #041025; font-weight: 600; font-size: .9rem;
  cursor: pointer; transition: all .25s; flex-shrink: 0;
}
.chat-send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(109,213,255,.25); }
.chat-send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* Модалка нового диалога */
.new-conv-modal {
  position: fixed; inset: 0; z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity .3s, visibility 0s linear .3s;
}
.new-conv-modal.open {
  opacity: 1; visibility: visible; pointer-events: auto;
  transition: opacity .3s;
}
.new-conv-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
}
.new-conv-box {
  position: relative; z-index: 1;
  width: min(400px, calc(100vw - 40px));
  padding: 28px; border-radius: 18px;
  background: var(--grad-glass-heavy);
  border: 1px solid var(--line-bright);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow-lg);
  transform: translateY(16px) scale(.97);
  transition: transform .3s ease;
}
.new-conv-modal.open .new-conv-box { transform: translateY(0) scale(1); }
.new-conv-box h3 { margin: 0 0 16px; color: #fff; }
.new-conv-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--line); background: rgba(0,0,0,.3);
  color: var(--text); font-size: .95rem; margin-bottom: 10px;
  transition: border-color .3s; box-sizing: border-box;
}
.new-conv-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(109,213,255,.12); }
.new-conv-results { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
.new-conv-user {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
  background: rgba(255,255,255,.04); border: 1px solid var(--line);
  cursor: pointer; transition: all .2s;
}
.new-conv-user:hover { background: rgba(109,213,255,.08); border-color: rgba(109,213,255,.25); }
.new-conv-user-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--grad-primary); display: grid; place-items: center;
  font-weight: 700; color: #041025; font-size: .85rem; overflow: hidden; flex-shrink: 0;
}
.new-conv-user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
.new-conv-error { color: #ff6b6b; font-size: .82rem; min-height: 18px; }
.new-conv-close {
  position: absolute; top: 14px; right: 14px; width: 30px; height: 30px;
  border-radius: 8px; border: 1px solid var(--line);
  background: rgba(255,255,255,.05); color: var(--muted); font-size: 1.2rem;
  cursor: pointer; transition: all .25s; display: grid; place-items: center;
}
.new-conv-close:hover { background: rgba(255,100,100,.2); color: #ff6b6b; }

/* Гость */
.messages-guest {
  flex: 1; display: grid; place-items: center; text-align: center; color: var(--muted);
}
.messages-guest h3 { color: #fff; margin-bottom: 12px; }

@media (max-width: 640px) {
  .conv-sidebar { width: 100%; display: none; }
  .conv-sidebar.mobile-show { display: flex; }
  .chat-area { display: none; }
  .chat-area.mobile-show { display: flex; }
  .messages-wrap { padding-top: 90px; }
}

/* ═══════════════════════════════════════════════════════════
   ОТКЛЮЧАЕМ глобальный плавный скролл script.js на этой странице
   ═══════════════════════════════════════════════════════════ */
html, body {
  overflow: hidden !important;
  height: 100% !important;
}

/* Разрешаем скролл ТОЛЬКО внутри чата и сайдбара */
.chat-messages,
.conv-sidebar,
#chat-messages {
  overscroll-behavior-y: contain !important;
  -webkit-overflow-scrolling: touch;
}

/* Отключаем pointer-events на page-blur, чтобы он не блокировал скролл */
.page-blur {
  pointer-events: none !important;
}
  </style>
</head>
<body>
<div class="page-blur"></div>
<div class="dust">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>
<div id="header-container"></div>

<main class="messages-wrap">
  <div id="messages-root">
    <div class="messages-guest">
      <div>
        <div style="font-size:3rem;margin-bottom:12px;">💬</div>
        <h3>Загрузка...</h3>
      </div>
    </div>
  </div>
</main>

<!-- Модалка нового диалога -->
<div class="new-conv-modal" id="new-conv-modal">
  <div class="new-conv-backdrop" id="new-conv-backdrop"></div>
  <div class="new-conv-box">
    <button class="new-conv-close" id="new-conv-close">×</button>
    <h3>💬 Новый диалог</h3>
    <input class="new-conv-input" id="new-conv-search" placeholder="Введите имя пользователя..." autocomplete="off">
    <div class="new-conv-results" id="new-conv-results"></div>
    <p class="new-conv-error" id="new-conv-error"></p>
  </div>
</div>

<div id="footer-container"></div>
<script src="script.js" defer></script>
<script src="messages.js" defer></script>
</body>
</html>
