<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сообщения — EgorNetwork</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<style>
  /* ═══════════════════════════════════════════════════════════
   --- ОТКЛЮЧАЕМ глобальный плавный скролл script.js на этой странице
   ═══════════════════════════════════════════════════════════ */
  html, body {
    overflow: hidden !important;
    height: 100% !important;
  }

  /* Разрешаем скролл ТОЛЬКО внутри чата и сайдбара */
  .chat-messages,
  .conv-sidebar,
  #chat-messages {
    overscroll-behavior-y: contain !important;
    -webkit-overflow-scrolling: touch;
  }

  /* Отключаем pointer-events на page-blur, чтобы он не блокировал скролл */
  .page-blur {
    pointer-events: none !important;
  }
</style>
<body>
<div class="page-blur"></div>
<div class="dust">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>
<div id="header-container"></div>

<main class="messages-wrap">
  <div id="messages-root">
    <div class="messages-guest">
      <div>
        <div style="font-size:3rem;margin-bottom:12px;">💬</div>
        <h3>Загрузка...</h3>
      </div>
    </div>
  </div>
</main>

<div id="call-overlay" class="call-overlay"></div>

<!-- Модалка нового диалога -->
<div class="new-conv-modal" id="new-conv-modal">
  <div class="new-conv-backdrop" id="new-conv-backdrop"></div>
  <div class="new-conv-box">
    <button class="new-conv-close" id="new-conv-close">×</button>
    <h3>💬 Новый диалог</h3>
    <input class="new-conv-input" id="new-conv-search" placeholder="Введите имя пользователя..." autocomplete="off">
    <div class="new-conv-results" id="new-conv-results"></div>
    <p class="new-conv-error" id="new-conv-error"></p>
  </div>
</div>

<div id="footer-container"></div>
<script src="script.js" defer></script>
<script src="messages.js" defer></script>
</body>
</html>
